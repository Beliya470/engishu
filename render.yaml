services:
  - type: web
    name: engishu-crm
    env: node
    plan: free
    buildCommand: >
      cd client && npm install && npm run build &&
      cd ../server && npm install &&
      cp prisma/schema.prod.prisma prisma/schema.prisma &&
      npx prisma generate &&
      npx prisma migrate deploy
    startCommand: >
      cd server &&
      node -e "require('./prisma/seed.prod.js')" ; node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: cover@engishu.com
      - key: ADMIN_EMAIL_LOGIN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
